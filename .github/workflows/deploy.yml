name: Deploy to production

# Mỗi lần push lên main: build bên trong container AlmaLinux 8 (khớp glibc
# 2.28 với server CloudLinux 8 của TinoHost — bắt buộc vì các gói native như
# sharp/@tailwindcss/oxide biên dịch riêng theo glibc, build trên Ubuntu
# runner mặc định sẽ KHÔNG chạy được trên server). Server này là gói hosting
# cPanel (Node.js Selector), không có quyền root và giới hạn số luồng/tiến
# trình rất thấp — không build trực tiếp trên server được (đã xác nhận thật
# qua thử nghiệm: @tailwindcss/oxide panic "OS can't spawn worker thread"
# ngay cả khi giới hạn 1 core CPU). Nên build ở GitHub Actions rồi chỉ đẩy
# thư mục `.output` (đã build xong, thuần JS + binary đúng glibc) lên server,
# sau đó gọi cloudlinux-selector restart để Passenger nạp bản mới.
# Dùng `tar` nén rồi truyền qua SSH thay vì `rsync` — server hosting chia sẻ
# này không có sẵn lệnh `rsync` (không có quyền cài, đã xác nhận thật:
# "bash: rsync: command not found") nhưng `tar`/`gzip` luôn có sẵn trên mọi
# hệ Linux kể cả hosting hạn chế nhất.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: almalinux:8

    steps:
      - name: Cài Node.js 20 + công cụ cần thiết
        run: |
          dnf install -y git openssh-clients tar gzip
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y nodejs
          node -v

      - name: Clone code nhánh main mới nhất
        run: git clone --depth 1 --branch main https://github.com/${{ github.repository }}.git repo

      - name: Cài dependencies (kể cả devDependencies) + build
        working-directory: repo/web
        run: |
          npm ci --include=dev
          npm run build

      - name: Đẩy bản build lên server qua rsync/SSH + khởi động lại app
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          # Bỏ qua xác minh host key: ssh-keyscan không đáng tin cậy trong
          # container CI (từng fail âm thầm gây "Host key verification
          # failed"). Chấp nhận được cho pipeline CI tự động, IP server cố
          # định đã khai báo qua secret.
          # LƯU Ý: dùng $HOME chứ không phải "~" trong biến shell — dấu ~ chỉ
          # được bash tự thay bằng home dir khi gõ trực tiếp ở đầu 1 từ, KHÔNG
          # được thay khi nằm bên trong giá trị 1 biến (đã gặp lỗi thật:
          # "Identity file ~/.ssh/... not accessible: No such file").
          #
          # LỖI THẬT ĐÃ GẶP & FIX (21/07): deploy fail với
          # "kex_exchange_identification: Connection closed by remote host"
          # — server đóng kết nối NGAY LÚC BẮT TAY, TRƯỚC CẢ bước xác thực
          # khoá. Kiểm chứng: SSH thủ công từ máy khác (IP quen thuộc) bắt
          # tay + xác thực bình thường (chỉ báo sai khoá vì không có key
          # đúng) — chứng tỏ sshd server hoạt động tốt, không phải lỗi khoá/
          # secret. Nghi vấn cao nhất: cPHulk (chống brute-force của cPanel)
          # trên hosting chia sẻ chặn IP LẠ khi thấy NHIỀU kết nối SSH liên
          # tiếp trong thời gian ngắn — bản trước mở tới 3 kết nối SSH RIÊNG
          # BIỆT (rm/mkdir, tar pipe, restart) từ 1 IP hoàn toàn mới mỗi lần
          # chạy (IP của GitHub Actions đổi mỗi lần), trông giống hành vi dò
          # quét. Khắc phục: dùng SSH connection multiplexing
          # (ControlMaster/ControlPersist) — CHỈ bắt tay + xác thực 1 LẦN
          # DUY NHẤT, các lệnh sau tái dùng đúng kết nối đó qua socket cục
          # bộ, không mở kết nối mới. Kèm retry cho lần kết nối đầu (nếu
          # cPHulk chặn tạm thời/theo cửa sổ thời gian, thử lại sau vài giây
          # nhiều khả năng qua được).
          mkdir -p "$HOME/.ssh/cm"
          SSH_OPTS="-i $HOME/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=$HOME/.ssh/cm/%r@%h-%p"

          connect_ok=0
          for attempt in 1 2 3 4 5; do
            if ssh $SSH_OPTS -o ConnectTimeout=15 "$SSH_USER@$SSH_HOST" "echo ok"; then
              connect_ok=1
              break
            fi
            echo "Kết nối SSH lần $attempt thất bại, thử lại sau 8 giây..."
            sleep 8
          done
          if [ "$connect_ok" -ne 1 ]; then
            echo "::error::Không kết nối SSH được tới server sau 5 lần thử — kiểm tra cPHulk/tường lửa trên cPanel."
            exit 1
          fi

          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "rm -rf ~/repo/web/.output && mkdir -p ~/repo/web/.output"
          tar -czf - -C repo/web/.output . | ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "tar -xzf - -C ~/repo/web/.output"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "/usr/sbin/cloudlinux-selector restart --json --interpreter nodejs --app-root repo/web"
          ssh $SSH_OPTS -O exit "$SSH_USER@$SSH_HOST" 2>/dev/null || true
